<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWA - Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }
    .login-card h1 span { color: var(--accent); }
    .login-card .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: var(--font);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .btn-submit {
      width: 100%;
      padding: 0.7rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .toggle {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .toggle a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .toggle a:hover { text-decoration: underline; }
    .error-msg {
      background: rgba(255,107,107,0.1);
      color: var(--red);
      padding: 0.5rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1><span>SWA</span> Analytics</h1>
      <p class="subtitle" id="form-subtitle">Sign in to your dashboard</p>
      <div class="error-msg" id="error-msg"></div>
      <form id="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" minlength="8">
        </div>
        <button type="submit" class="btn-submit" id="btn-submit">Sign In</button>
      </form>
      <div class="toggle" id="toggle-mode">
        <span id="toggle-text">First time? </span><a id="toggle-link" href="#">Create account</a>
      </div>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
